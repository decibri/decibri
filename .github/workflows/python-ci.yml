name: Python CI

on:
  push:
    branches: [main, development]
    paths:
      - 'bindings/python/**'
      - 'crates/decibri/**'
      - 'Cargo.toml'
      - '.cargo/config.toml'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'bindings/python/**'
      - 'crates/decibri/**'
      - 'Cargo.toml'
      - '.cargo/config.toml'
      - '.github/workflows/python-ci.yml'
  workflow_dispatch:
  schedule:
    # Nightly full 4 OS x 5 Python regression run at 04:00 UTC
    # (14:00 AEST / 13:00 AEDT). Catches forward-compatibility issues
    # that the reduced push matrix (3.10 floor + 3.14 ceiling only)
    # does not exercise on every commit. Distinct from any other cron
    # schedules in this repo (check-upstream.yml runs Sundays 22:00 UTC).
    - cron: "0 4 * * *"

concurrency:
  # Distinct from ci.yml's `ci-${{ github.ref }}` group so Rust-side CI and
  # Python-side CI run in parallel per ref, cancelling only their own
  # in-progress runs when a new push lands.
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Required for maturin abi3 builds on Python 3.14 hosts targeting py310 abi3.
  # See PyO3 issue #5505 (https://github.com/PyO3/pyo3/issues/5505). Without
  # this opt-in, PyO3 0.28 refuses abi3 wheel builds when the build-host
  # Python is newer than the abi3 target, even though the abi3 contract
  # guarantees forward compatibility. Setting this at workflow level applies
  # to every matrix entry; it is a no-op on Python 3.10 through 3.13 build
  # hosts and only takes effect for the 3.14 entries.
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
  # Single source of truth for the bundled ONNX Runtime version, mirroring
  # release.yml's pattern (release.yml line 20). Read by the per-platform
  # preflight + download steps below. Also parsed by check-upstream.yml's
  # ONNX Runtime drift check (the workflow greps release.yml for
  # ORT_VERSION; the Python wheel pipeline pins to the same value here).
  # Update in lockstep with release.yml at every ort-crate upgrade per the
  # workspace Cargo.toml maintainer comment (steps 2 and 3 of that comment).
  ORT_VERSION: 1.24.4

jobs:
  python-ci:
    name: Build & Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      # fail-fast cancels sibling matrix entries on first failure. CI tests a
      # single unit (does the wheel build and pass tests across the supported
      # platform / runtime grid?); a failure on any entry is the whole-matrix
      # signal. Saves runner minutes when one entry surfaces a regression.
      fail-fast: true
      matrix:
        # Matrix sizing by trigger:
        #   pull_request:      3 jobs  (ubuntu-latest x 3 Python: floor, middle, ceiling)
        #   push:              8 jobs  (4 OS x 2 Python: 3.10 floor + 3.14 ceiling)
        #   workflow_dispatch: 20 jobs (full 4 OS x 5 Python)
        #   schedule (nightly): 20 jobs (full 4 OS x 5 Python)
        #
        # abi3-py310 wheels are forward-compatible by construction across
        # Python 3.10-3.14 per CPython's stable ABI guarantee. Running 5
        # Python versions on every push duplicates work for most regressions;
        # floor + ceiling on push catches forward-compat issues that abi3
        # does not shield (e.g., behavior changes in CPython runtime APIs
        # that abi3 still inherits). The full matrix runs nightly and on
        # manual dispatch for comprehensive coverage. Roughly 60% reduction
        # in push-triggered CI minutes vs. the prior 4 OS x 5 Python shape.
        #
        # OS matrix (full) mirrors release.yml's cross-platform precedent:
        # - ubuntu-latest         (x86_64-unknown-linux-gnu)
        # - ubuntu-24.04-arm      (aarch64-unknown-linux-gnu)
        # - windows-latest        (x86_64-pc-windows-msvc)
        # - macos-14              (aarch64-apple-darwin; Apple Silicon only,
        #                          no Intel coverage matching release.yml)
        # macos-14 is pinned (not macos-latest) for consistency with
        # release.yml; pin-bumping is a deliberate cross-workflow action.
        # ubuntu-24.04-arm is the explicit pin for native ARM64 runners.
        #
        # Python version matrix (full): floor 3.10 per pyproject.toml
        # requires-python. 3.14 GA'd 2025-10-07; well-seasoned by Phase 2
        # ship. abi3 contract means one wheel covers all five runtimes;
        # the full matrix verifies the contract empirically against every
        # supported interpreter. PR subset (3.10, 3.12, 3.14) covers floor,
        # middle, and ceiling. Push subset (3.10, 3.14) covers floor and
        # ceiling only; the middle three columns become nightly canaries.
        #
        # fromJSON(...) wrappers are required: GitHub Actions expression
        # results are strings, but matrix axes must be arrays.
        os: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["ubuntu-latest", "ubuntu-24.04-arm", "windows-latest", "macos-14"]') }}
        python-version: ${{ fromJSON((github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && '["3.10", "3.11", "3.12", "3.13", "3.14"]' || github.event_name == 'pull_request' && '["3.10", "3.12", "3.14"]' || '["3.10", "3.14"]') }}
    env:
      # Drives uv's interpreter selection per matrix entry. Replaces the
      # previous workflow-wide UV_PYTHON: "3.10" pin (single-version CI was
      # the abi3-floor canary; the matrix now exercises every supported
      # runtime explicitly).
      UV_PYTHON: ${{ matrix.python-version }}
    # Action pin policy: third-party actions pinned to immutable commit SHAs
    # with a `# vX.Y.Z` version comment that dependabot parses for updates.
    # Floating major tags (@v6, @v8) were the attack vector for the 2025
    # tj-actions/changed-files supply-chain compromise; SHA pins eliminate
    # that class of risk. setup-uv v8 explicitly stopped publishing major
    # tags for this reason, which is what surfaced this hardening pass.
    #
    # Exception: `dtolnay/rust-toolchain` is documented to use the rolling
    # `@stable` / `@nightly` / `@1.83.0` form; the maintainer explicitly
    # warns against SHA pinning (orphan-GC risk on the rolling branches).
    # Acceptable because the action is a thin shell wrapper around rustup;
    # the security boundary is rustup itself, not the action.
    #
    # The existing ci.yml workflow uses floating major tags (v6 / v2 etc).
    # Pinning that workflow to SHAs is deferred to Phase 5 CI hardening
    # (see Phase 1 plan §7.7).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install libasound2-dev (Linux only)
        # cpal (transitive via decibri core) needs ALSA dev headers on Linux.
        # Same system dep the Rust test-rust job in ci.yml installs. macOS
        # provides CoreAudio via system frameworks; Windows provides WASAPI
        # via the Windows SDK; neither needs a system package install.
        # `runner.os` is one of Linux / Windows / macOS regardless of
        # architecture, so this single conditional covers both
        # ubuntu-latest (x64) and ubuntu-24.04-arm (ARM64).
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          # Distinct from ci.yml's "rust" shared-key. The two workflows'
          # target graphs diverge (napi cdylib vs pyo3 cdylib + python3-dll-a
          # + abi3 import-lib generation), so isolated caches reach steady
          # state independently without write contention.
          shared-key: "rust-python"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "bindings/python/uv.lock"

      - name: Install Python ${{ matrix.python-version }}
        # uv ships pre-built Python interpreters for every supported
        # platform (linux-x64, linux-aarch64, darwin-aarch64, win-x64),
        # so this single command works across all four matrix OSes
        # without per-OS conditionals.
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dev environment (locked)
        working-directory: bindings/python
        # --locked fails the build if uv.lock is out of sync with
        # pyproject.toml, surfacing lockfile drift as a loud CI error
        # rather than silently regenerating. Local devs use plain
        # `uv sync --dev` (no --locked) per CLAUDE.md Gate 6.
        run: uv sync --dev --locked

      - name: Compute ORT platform metadata
        id: ort-meta
        shell: bash
        # Maps RUNNER_OS + RUNNER_ARCH to the upstream ONNX Runtime
        # tarball naming convention. The four expected combinations
        # mirror release.yml's per-job matrix.ort_platform_slug values:
        # win-x64, osx-arm64, linux-x64, linux-aarch64. python-ci.yml's
        # matrix is conditional (sized by trigger) so the slug cannot be
        # carried as a matrix dimension; computing it here keeps a single
        # source of truth and lets the preflight + download steps below
        # share one URL.
        run: |
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64)    SLUG="linux-x64";     EXT="tgz" ;;
            Linux-ARM64)  SLUG="linux-aarch64"; EXT="tgz" ;;
            macOS-ARM64)  SLUG="osx-arm64";     EXT="tgz" ;;
            Windows-X64)  SLUG="win-x64";       EXT="zip" ;;
            *)
              echo "ERROR: unsupported runner OS+arch combination: ${RUNNER_OS}-${RUNNER_ARCH}"
              exit 1
              ;;
          esac
          URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-${SLUG}-${ORT_VERSION}.${EXT}"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "ext=${EXT}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${URL}"

      - name: Verify ONNX Runtime tarball availability
        shell: bash
        # Mirrors release.yml lines 131-143: HEAD-check the URL before
        # the heavier download runs, so a Microsoft asset rename or yank
        # surfaces immediately with a clear error message rather than as
        # an opaque mid-build failure. Same pattern in production for the
        # Node release pipeline since 3.0.
        run: |
          URL="${{ steps.ort-meta.outputs.url }}"
          echo "Verifying: $URL"
          if ! curl -sIfL --retry 3 --retry-delay 2 -o /dev/null "$URL"; then
            echo "ERROR: expected ONNX Runtime tarball not available at $URL"
            echo "This may mean Microsoft renamed release assets, delayed a release,"
            echo "or the pinned ORT_VERSION no longer exists upstream."
            echo "Check: https://github.com/microsoft/onnxruntime/releases/tag/v${ORT_VERSION}"
            exit 1
          fi
          echo "OK: tarball is available"

      - name: Download and extract ONNX Runtime (macOS)
        if: runner.os == 'macOS'
        shell: bash
        # Mirrors release.yml lines 145-155. cp -L dereferences the
        # symlink chain (libonnxruntime.dylib -> libonnxruntime.<ver>.dylib)
        # so the bundled file is a real signed dylib, not a dangling link
        # post-pip-install. Renamed to unversioned to match what the Python
        # resolver looks for under python/decibri/_ort/.
        run: |
          SLUG="${{ steps.ort-meta.outputs.slug }}"
          URL="${{ steps.ort-meta.outputs.url }}"
          mkdir -p bindings/python/python/decibri/_ort
          curl -sL --retry 3 --retry-delay 2 -o ort.tgz "$URL"
          tar -xzf ort.tgz
          SRC="onnxruntime-${SLUG}-${ORT_VERSION}"
          cp -L "$SRC/lib/libonnxruntime.${ORT_VERSION}.dylib" bindings/python/python/decibri/_ort/libonnxruntime.dylib

      - name: Verify libonnxruntime.dylib codesign (macOS, diagnostic)
        if: runner.os == 'macOS'
        continue-on-error: true
        # Non-gating mirror of release.yml lines 157-167: cp -L on a real
        # file preserves signed bytes but does not preserve the original
        # filename the signature may be scoped to. Microsoft's upstream
        # dylib is signed; this surfaces whether the rename invalidates
        # the signature. On failure the step is marked red but the
        # workflow proceeds.
        run: codesign -v --verbose=2 bindings/python/python/decibri/_ort/libonnxruntime.dylib

      - name: Download and extract ONNX Runtime (Linux)
        if: runner.os == 'Linux'
        shell: bash
        # Mirrors release.yml lines 169-183. Two files copied: the main
        # dylib (symlink-resolved) and libonnxruntime_providers_shared.so
        # (kept under its exact upstream name). The main dylib dlopens
        # the providers solib by basename via $ORIGIN RUNPATH at session
        # creation; without it Linux SileroVad fails to load.
        run: |
          SLUG="${{ steps.ort-meta.outputs.slug }}"
          URL="${{ steps.ort-meta.outputs.url }}"
          mkdir -p bindings/python/python/decibri/_ort
          curl -sL --retry 3 --retry-delay 2 -o ort.tgz "$URL"
          tar -xzf ort.tgz
          SRC="onnxruntime-${SLUG}-${ORT_VERSION}"
          cp -L "$SRC/lib/libonnxruntime.so" bindings/python/python/decibri/_ort/libonnxruntime.so
          cp "$SRC/lib/libonnxruntime_providers_shared.so" bindings/python/python/decibri/_ort/

      - name: Download and extract ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Mirrors release.yml lines 185-195. The Windows zip ships
        # onnxruntime.dll (no rename needed; upstream name matches what
        # the Python resolver looks for) and onnxruntime_providers_shared.dll;
        # we bundle only the main DLL, matching release.yml's proven Node
        # distribution. CPU EP (the only path Phase 3 uses per master-plan
        # Decision 1) does not load providers_shared on Windows. If a
        # future GPU EP integration needs it, revisit.
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "${{ steps.ort-meta.outputs.url }}"
          New-Item -ItemType Directory -Force -Path bindings/python/python/decibri/_ort | Out-Null
          Invoke-WebRequest -Uri $url -OutFile ort.zip -MaximumRetryCount 3 -RetryIntervalSec 2
          Expand-Archive -Path ort.zip -DestinationPath .
          $src = "onnxruntime-${{ steps.ort-meta.outputs.slug }}-$env:ORT_VERSION"
          Copy-Item "$src/lib/onnxruntime.dll" bindings/python/python/decibri/_ort/

      - name: Inspect onnxruntime.dll imports (Windows, diagnostic)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        # Non-gating mirror of release.yml lines 197-217. dumpbin ships
        # under VS install path and is not on default PATH on
        # windows-latest runners. Output (the DLL's import table) goes to
        # the log so unexpected dependencies (odd MSVC runtime, Windows
        # SDK DLLs, etc.) surface before users hit "cannot find library
        # X" at runtime.
        run: |
          $dumpbin = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dumpbin) {
            Write-Host "dumpbin.exe not found under the Visual Studio install path"
            exit 1
          }
          Write-Host "Using dumpbin: $($dumpbin.FullName)"
          & $dumpbin.FullName /imports bindings/python/python/decibri/_ort/onnxruntime.dll

      - name: Build extension (maturin develop, dev profile)
        working-directory: bindings/python
        # Installs the extension into the synced venv for pytest.
        run: uv run maturin develop --uv

      - name: Run pytest
        working-directory: bindings/python
        # GitHub Actions sets CI=true automatically; conftest.py auto-skips
        # the requires_audio_input / requires_audio_output / requires_bundled_ort
        # markers under that signal. CI runs only the no-hardware subset
        # (~84 tests of the 107 in the suite).
        run: uv run pytest -v

      - name: Run mypy --strict (Linux only)
        # mypy strict is identical regardless of OS; running it on every
        # matrix entry would surface the same errors four times for no
        # additional signal. Pinned to Linux (both x64 and ARM64) because
        # both share the canonical type-check environment; macOS / Windows
        # entries skip this step.
        if: runner.os == 'Linux'
        working-directory: bindings/python
        run: uv run mypy --strict python/

      - name: Build release wheel (smoke; not uploaded)
        working-directory: bindings/python
        # Validates the release-profile abi3 wheel builds end-to-end,
        # separate from the dev-profile `maturin develop` above. Catches
        # release-only issues (lto, strip, codegen-units = 1) before they'd
        # surface during Phase 5 TestPyPI publish. Adds ~30s per matrix
        # entry; acceptable cost for the pre-publish insurance. Artifact
        # not uploaded; Phase 3 adds the cross-platform wheel upload matrix.
        run: uv run maturin build --release
