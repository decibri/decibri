name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: win32-x64-msvc
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64-gnu
            setup: sudo apt-get update && sudo apt-get install -y libasound2-dev

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Platform setup
        if: matrix.setup
        run: ${{ matrix.setup }}

      - name: Install npm dependencies
        run: cd npm/decibri && npm install --ignore-optional

      - name: Build native addon
        shell: bash
        run: |
          cd npm/decibri
          npx napi build --platform --release \
            -p decibri-node \
            --manifest-path ../../bindings/node/Cargo.toml \
            --target ${{ matrix.target }} \
            -o .

      - name: Verify binary exists
        shell: bash
        run: ls -la npm/decibri/decibri.*.node

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: npm/decibri/decibri.*.node

      - uses: actions/upload-artifact@v7
        with:
          name: decibri-${{ matrix.artifact }}
          path: npm/decibri/decibri.*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: dtolnay/rust-toolchain@stable

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Stage platform binaries
        run: |
          cp artifacts/decibri-win32-x64-msvc/decibri.win32-x64-msvc.node npm/win32-x64-msvc/
          cp artifacts/decibri-darwin-arm64/decibri.darwin-arm64.node npm/darwin-arm64/
          cp artifacts/decibri-linux-x64-gnu/decibri.linux-x64-gnu.node npm/linux-x64-gnu/

      - name: Generate napi loader
        run: |
          cd npm/decibri
          npm install --ignore-optional
          cp artifacts/decibri-linux-x64-gnu/decibri.linux-x64-gnu.node .
          npx napi build --platform --release \
            -p decibri-node \
            --manifest-path ../../bindings/node/Cargo.toml \
            -o . || true
        # The napi build may fail on publish runner (no ALSA), but index.js
        # should already exist from the build step. If not, the publish will
        # fail and we'll know.

      # Publish platform packages FIRST (main package depends on them)
      - name: Publish @decibri/win32-x64-msvc
        run: cd npm/win32-x64-msvc && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @decibri/darwin-arm64
        run: cd npm/darwin-arm64 && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @decibri/linux-x64-gnu
        run: cd npm/linux-x64-gnu && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish main package (after platform packages are available)
      - name: Publish decibri
        run: cd npm/decibri && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish Rust crate
      - name: Publish to crates.io
        run: cargo publish -p decibri
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Create GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Verify publish succeeded
      - name: Verify npm publish
        run: |
          sleep 30
          npm view decibri@${{ github.ref_name }}
