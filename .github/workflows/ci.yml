name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust"
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust"
      - run: cargo generate-lockfile
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust"
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo test-decibri

  test-node:
    name: Node.js Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust"
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            npm/decibri/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install npm dependencies
        run: cd npm/decibri && npm install --ignore-optional
      - name: Build native addon
        run: cd npm/decibri && npm run build
      - name: Run CI-safe tests
        run: node tests/test-ci.js
      - name: Audit npm dependencies
        run: cd npm/decibri && npm audit --omit=dev || true

  test-browser:
    name: Browser Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install vitest
        run: npm install
      - name: Run browser unit tests
        run: npx vitest run
