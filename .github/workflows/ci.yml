name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo test -p decibri

  test-node:
    name: Node.js Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install npm dependencies
        run: cd npm/decibri && npm install --ignore-optional
      - name: Build native addon
        run: cd npm/decibri && npm run build
      - name: Run CI-safe tests
        run: node tests/test-ci.js
      - name: Audit npm dependencies
        run: cd npm/decibri && npm audit --omit=dev || true

  test-browser:
    name: Browser Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install vitest
        run: npm install
      - name: Run browser unit tests
        run: npx vitest run
