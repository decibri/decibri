version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    target-branch: development
    schedule:
      interval: weekly
    groups:
      cargo-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/npm/decibri"
    target-branch: development
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: development
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: "/bindings/python"
    target-branch: development
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
